# Starship prompt config — Catppuccin Mocha palette
# Replaces Powerlevel10k (resize-safe, no right-prompt reflow artifacts)

format = """$directory$git_branch$git_status$character"""

right_format = """$kubernetes$time"""

# Don't add blank line between prompts
add_newline = false

# --- Left prompt ---

[directory]
style = "bold blue"
truncation_length = 3
truncation_symbol = ".../"
truncate_to_repo = false

[git_branch]
style = "bold green"
format = "[$symbol$branch(:$remote_branch)]($style) "
symbol = " "

[git_status]
style = "bold yellow"
format = "[$all_status$ahead_behind]($style)"
conflicted = "="
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"
untracked = "?${count}"
stashed = "*${count}"
modified = "!${count}"
staged = "+${count}"
deleted = "x${count}"

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"

# --- Right prompt ---

[time]
disabled = false
style = "dimmed white"
format = "[ $time]($style) "
time_format = "%H:%M"

[kubernetes]
disabled = false
detect_env_vars = ["STARSHIP_KUBECTL_ACTIVE"]
format = '[$symbol$context]($style) [/$namespace]($style) '
style = "bold #d3869b"
symbol = "☸ "
contexts = [
  { context_pattern = '^arn:aws:eks:[^:]+:[0-9]+:cluster/(?P<cluster>[[:alnum:]_.-]+)$', context_alias = '$cluster' },
]
